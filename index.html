<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bellora Royale · En construction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0716;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 30% 40%, #1a1230, #07040e 80%);
    }

    .bg-particles::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(2px 2px at 20% 30%, rgba(200, 170, 255, 0.2), transparent),
        radial-gradient(2px 2px at 40% 70%, rgba(200, 170, 255, 0.15), transparent),
        radial-gradient(2px 2px at 60% 20%, rgba(200, 170, 255, 0.25), transparent),
        radial-gradient(2px 2px at 80% 80%, rgba(200, 170, 255, 0.1), transparent),
        radial-gradient(3px 3px at 10% 90%, rgba(180, 140, 255, 0.2), transparent),
        radial-gradient(3px 3px at 90% 10%, rgba(180, 140, 255, 0.15), transparent);
      background-size: 200% 200%;
      animation: shimmerBg 20s ease-in-out infinite alternate;
    }

    @keyframes shimmerBg {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    .container {
      max-width: 820px;
      width: 100%;
      background: rgba(14, 10, 26, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 4rem;
      padding: 3rem 2.8rem;
      box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(180, 150, 255, 0.12);
      text-align: center;
      border: 1px solid rgba(180, 150, 255, 0.08);
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg at 50% 50%, transparent, rgba(160, 120, 255, 0.02), transparent, rgba(160, 120, 255, 0.02), transparent);
      animation: rotateGlow 30s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ---- LOGO IMAGE ---- */
    .logo-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 2.2rem;
      position: relative;
      z-index: 2;
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .logo-image {
      max-width: 320px;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 30px rgba(160, 120, 255, 0.3));
      transition: filter 0.5s ease;
      border-radius: 20px;
    }

    .logo-image:hover {
      filter: drop-shadow(0 0 50px rgba(160, 120, 255, 0.6));
    }

    /* fallback si l'image ne charge pas */
    .logo-fallback {
      display: none;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f5eeff, #d6c2ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 4px;
      font-family: 'Georgia', serif;
    }

    .logo-image:not([src]), .logo-image[src=""] {
      display: none;
    }

    .logo-image:not([src]) + .logo-fallback,
    .logo-image[src=""] + .logo-fallback {
      display: block;
    }

    /* ---- message principal ---- */
    .message {
      font-size: 1.7rem;
      font-weight: 300;
      color: #e8ddff;
      margin: 1.6rem 0 0.8rem;
      line-height: 1.5;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      position: relative;
      z-index: 2;
      letter-spacing: 0.5px;
    }

    .message strong {
      font-weight: 600;
      background: linear-gradient(120deg, #f0e6ff, #d6bfff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub-message {
      font-size: 1rem;
      color: #b09acb;
      margin-bottom: 2.2rem;
      padding: 0.5rem 1.5rem;
      display: inline-block;
      border-top: 1px solid rgba(130, 100, 180, 0.25);
      border-bottom: 1px solid rgba(130, 100, 180, 0.25);
      letter-spacing: 2px;
      backdrop-filter: blur(2px);
      position: relative;
      z-index: 2;
    }

    /* ---- compte à rebours ---- */
    .countdown-wrapper {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin: 1.8rem 0 1.2rem;
      position: relative;
      z-index: 2;
    }

    .time-block {
      background: rgba(8, 5, 20, 0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      min-width: 75px;
      border: 1px solid #4d3a70;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(130, 80, 255, 0.08);
      transition: all 0.25s ease;
    }

    .time-block:hover {
      border-color: #b494f0;
      box-shadow: 0 0 30px #8f6cdb55, inset 0 0 25px #7a5bb555;
      transform: scale(1.02);
    }

    .time-block span {
      display: block;
    }

    .time-number {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(180deg, #f2ecff, #cdb8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 30px #8f6cdb;
    }

    .time-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #a689cf;
      margin-top: 2px;
      opacity: 0.8;
      font-weight: 300;
    }

    /* ---- pied de page ---- */
    .footer-note {
      margin-top: 2.6rem;
      color: #9a82bd;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }

    .footer-note .divider {
      width: 35px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #9370db, transparent);
    }

    .footer-note .bell-icon {
      font-size: 1.1rem;
      opacity: 0.6;
      animation: ring 2.5s infinite;
    }

    @keyframes ring {
      0%, 100% { transform: rotate(0deg); }
      4% { transform: rotate(14deg); }
      8% { transform: rotate(-10deg); }
      12% { transform: rotate(6deg); }
      16% { transform: rotate(0deg); }
    }

    /* responsive */
    @media (max-width: 600px) {
      .container { padding: 2rem 1.2rem; border-radius: 2.5rem; }
      .logo-image { max-width: 220px; }
      .message { font-size: 1.3rem; }
      .time-number { font-size: 2.2rem; }
      .countdown-wrapper { gap: 0.7rem; }
      .time-block { min-width: 60px; padding: 0.4rem 0.7rem; }
      .footer-note { font-size: 0.75rem; gap: 0.4rem; }
    }

    @media (max-width: 420px) {
      .logo-image { max-width: 170px; }
      .time-number { font-size: 1.8rem; }
      .time-block { min-width: 50px; padding: 0.3rem 0.4rem; }
    }
  </style>
</head>
<body>

  <div class="bg-particles"></div>

  <div class="container">
    <!-- LOGO IMAGE -->
    <div class="logo-wrapper">
      <img src="Logo.jpeg" alt="Bellora Royale" class="logo-image" onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='block';">
      <span class="logo-fallback" id="fallbackLogo">✦ BELLORA ROYALE ✦</span>
    </div>

    <!-- message principal -->
    <h1 class="message">
      <strong>Bienvenue sur le site internet</strong><br>
      Bellora Royale
    </h1>
    <div class="sub-message">✦ site en construction ✦</div>

    <!-- COMPTE À REBOURS -->
    <div class="countdown-wrapper" id="countdownContainer">
      <div class="time-block">
        <span class="time-number" id="days">00</span>
        <span class="time-label">Jours</span>
      </div>
      <div class="time-block">
        <span class="time-number" id="hours">00</span>
        <span class="time-label">Heures</span>
      </div>
      <div class="time-block">
        <span class="time-number" id="minutes">00</span>
        <span class="time-label">Minutes</span>
      </div>
      <div class="time-block">
        <span class="time-number" id="seconds">00</span>
        <span class="time-label">Secondes</span>
      </div>
    </div>

    <!-- message de retour -->
    <div class="footer-note">
      <span class="divider"></span>
      <span class="bell-icon">🔔</span>
      <span>revenez plus tard · nous préparons quelque chose de grandiose</span>
      <span class="bell-icon">🔔</span>
      <span class="divider"></span>
    </div>
  </div>

  <script>
    (function() {
      const targetDate = new Date();
      targetDate.setDate(targetDate.getDate() + 2);
      targetDate.setHours(0, 0, 0, 0);

      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      function padZero(num) {
        return String(num).padStart(2, '0');
      }

      function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate.getTime() - now;

        if (diff <= 0) {
          daysEl.textContent = '00';
          hoursEl.textContent = '00';
          minutesEl.textContent = '00';
          secondsEl.textContent = '00';
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        daysEl.textContent = padZero(days);
        hoursEl.textContent = padZero(hours);
        minutesEl.textContent = padZero(minutes);
        secondsEl.textContent = padZero(seconds);
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);

      const blocks = document.querySelectorAll('.time-block');
      blocks.forEach(block => {
        block.addEventListener('mouseenter', () => {
          block.style.borderColor = '#b494f0';
          block.style.boxShadow = '0 0 35px #9b7bdb, inset 0 0 25px #7a5bb5';
        });
        block.addEventListener('mouseleave', () => {
          block.style.borderColor = '#4d3a70';
          block.style.boxShadow = '0 8px 20px rgba(0,0,0,0.6), inset 0 0 20px rgba(130,80,255,0.08)';
        });
      });
    })();
  </script>
</body>
</html>
